name: Deploy — Azure Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Necessário para OIDC
  contents: read

jobs:
  pre-deploy-validation:
    name: Validação pre-deploy (gates de qualidade)
    uses: ./.github/workflows/pre-deploy-validation.yml
    with:
      environment: production

  test-before-deploy:
    name: Testes obrigatórios antes do deploy
    uses: ./.github/workflows/ci.yml
    needs: pre-deploy-validation

  deploy:
    name: Deploy para Azure
    runs-on: ubuntu-latest
    needs: test-before-deploy   # Nunca faz deploy se os testes falharem
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure via OIDC (sem client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Instalar dependências
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Deploy para Azure Functions (build remote)
        # Método correto: func publish --build remote
        # NÃO usar zip/config-zip/WEBSITE_RUN_FROM_PACKAGE — causam pacote stale
        run: |
          cd backend
          func azure functionapp publish ${{ vars.AZURE_FUNCTION_APP_NAME }} --build remote --python

      - name: Aguardar app inicializar (cold start)
        run: sleep 45

      - name: Validação pós-deploy (smoke tests)
        run: |
          chmod +x infra/post_deploy_validation.sh
          ./infra/post_deploy_validation.sh ${{ vars.AZURE_FUNCTION_APP_NAME }}

      - name: Rollback automático se health check falhar
        if: failure()
        run: |
          echo "Deploy falhou — executando rollback"
          az functionapp deployment slot swap \
            --name ${{ vars.AZURE_FUNCTION_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production \
            || echo "Rollback via slot não disponível — verificar manualmente"
