name: CI — Testes e Qualidade

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  credential-scan:
    name: Scan de credenciais hardcoded
    runs-on: ubuntu-latest
    # ⛔ Este job roda ANTES de qualquer teste.
    # Se detectar credencial, bloqueia o merge antes de desperdiçar tempo em testes.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Grep — padrões de credenciais hardcoded
        run: |
          # Busca padrões suspeitos em arquivos de código (exclui docs e exemplos)
          # Adicione ou remova padrões conforme o projeto
          set +e  # não falha imediatamente para coletar todos os matches

          FOUND=0

          echo "=== Verificando padrões de credenciais ==="

          # Stripe live keys
          grep -rn --include="*.py" --include="*.js" --include="*.ts" --include="*.php" \
            -E "(sk_live_|pk_live_)[a-zA-Z0-9]+" \
            --exclude-dir={.venv,__pycache__,.git,node_modules} . \
            && FOUND=1 || true

          # RSA/PEM keys embutidas no código
          grep -rn --include="*.py" --include="*.js" --include="*.ts" --include="*.php" \
            "BEGIN PRIVATE KEY\|BEGIN RSA PRIVATE\|BEGIN EC PRIVATE" \
            --exclude-dir={.venv,__pycache__,.git,node_modules} . \
            && FOUND=1 || true

          # Senhas hardcoded (password="algo", password='algo')
          grep -rn --include="*.py" --include="*.js" --include="*.ts" --include="*.php" \
            -E "password\s*=\s*['\"][^'\"]{4,}['\"]" \
            --exclude-dir={.venv,__pycache__,.git,node_modules} \
            --exclude="*.example" --exclude="conftest.py" . \
            && FOUND=1 || true

          # os.environ.get com fallback não-vazio suspeito (valor de mais de 8 chars)
          grep -rn --include="*.py" \
            -E "os\.environ\.get\(['\"][A-Z_]+['\"],\s*['\"][^'\"]{8,}['\"]" \
            --exclude-dir={.venv,__pycache__,.git,node_modules} . \
            && FOUND=1 || true

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "❌ CREDENCIAIS HARDCODED DETECTADAS — corrija antes de fazer merge."
            echo "   Use services.config.get_secret() ou variáveis de ambiente."
            exit 1
          else
            echo "✅ Nenhum padrão de credencial hardcoded encontrado."
          fi

      - name: Trufflehog scan (profundo)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  test:
    name: Testes Python (backend)
    runs-on: ubuntu-latest
    needs: credential-scan    # Testes só rodam se o scan passar

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ENVIRONMENT: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_SSLMODE: disable
      # Variáveis fake para mocks (Azure SDK é mockado nos testes unitários)
      AZURE_TENANT_ID: fake-tenant
      AZURE_CLIENT_ID: fake-client
      AZURE_CLIENT_SECRET: fake-secret
      JWT_ALGORITHM: HS256
      JWT_SECRET_FALLBACK: ci-test-secret-only-32-bytes-minimum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Rodar testes unitários
        run: |
          cd backend
          pytest tests/unit -v --tb=short

      - name: Rodar regressão obrigatória (fluxos críticos)
        run: |
          cd backend
          pytest tests/unit/test_regression.py -v --tb=short
        # Este step NUNCA pode ser removido ou ignorado.
        # Falha aqui = merge bloqueado independente de qualquer outra coisa.

      - name: Rodar testes de integração
        run: |
          cd backend
          pytest tests/integration -v --tb=short

      - name: Verificar cobertura mínima (auth + payment)
        run: |
          cd backend
          pytest tests/ -v -k "auth or payment" \
            --cov=services \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/htmlcov/
