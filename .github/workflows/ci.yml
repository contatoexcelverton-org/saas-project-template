name: CI — Testes e Qualidade

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test:
    name: Testes Python (backend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ENVIRONMENT: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_SSLMODE: disable
      # Variáveis fake para mocks (Azure SDK é mockado nos testes unitários)
      AZURE_TENANT_ID: fake-tenant
      AZURE_CLIENT_ID: fake-client
      AZURE_CLIENT_SECRET: fake-secret
      JWT_ALGORITHM: HS256
      JWT_SECRET_FALLBACK: ci-test-secret-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Rodar testes unitários
        run: |
          cd backend
          pytest tests/unit -v --tb=short

      - name: Rodar testes de integração
        run: |
          cd backend
          pytest tests/integration -v --tb=short

      - name: Verificar cobertura mínima (auth + payment)
        run: |
          cd backend
          pytest tests/ -v -k "auth or payment" \
            --cov=services \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/htmlcov/

  secret-scan:
    name: Verificar credenciais expostas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trufflehog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
